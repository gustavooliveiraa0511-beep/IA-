name: 🎬 Gerar Vídeo

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Tema do vídeo"
        required: true
        type: string
      template:
        description: "Template de edição"
        required: false
        default: "motivacional"
        type: choice
        options:
          - motivacional
          - viral
          - noticias
          - gaming
      voice:
        description: "Voz do narrador"
        required: false
        default: "pt-BR-AntonioNeural"
        type: string
      chat_id:
        description: "Telegram chat_id (pra enviar o vídeo)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  render:
    name: Renderizar vídeo
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Instala FFmpeg + fontes
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core fonts-liberation fontconfig
          fc-cache -f
          ffmpeg -version | head -1

      - name: 📦 Instala Impact (fonte das legendas)
        run: |
          mkdir -p ~/.fonts
          # Baixa Impact-like (Anton é substituto OSS muito parecido)
          curl -fsSL -o ~/.fonts/Anton.ttf \
            "https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf"
          fc-cache -f

      - name: 📦 Instala dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Gera vídeo
        env:
          THEME: ${{ inputs.theme }}
          TEMPLATE: ${{ inputs.template }}
          VOICE: ${{ inputs.voice }}
          CHAT_ID: ${{ inputs.chat_id }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_ID: ${{ secrets.TELEGRAM_ALLOWED_CHAT_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          PYTHONPATH: .
        run: |
          python -m src.run_pipeline

      - name: 📤 Upload artefato (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: ignore
